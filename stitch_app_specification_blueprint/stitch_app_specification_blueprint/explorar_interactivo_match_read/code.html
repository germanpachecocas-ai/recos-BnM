<html class="dark" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>

<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;family=Geist:wght@400;500;600&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .match-gradient {
            background: linear-gradient(135deg, #ff571a 0%, #ae3200 100%);
        }
        .discovery-stack {
            perspective: 1000px;
        }
        
        /* Kinetic Cinema Animations */
        @keyframes slideUpSpring {
            0% { transform: translateY(100px) scale(0.9); opacity: 0; }
            60% { transform: translateY(-10px) scale(1.02); opacity: 1; }
            100% { transform: translateY(0) scale(1); opacity: 1; }
        }
        
        @keyframes popIn {
            0% { transform: scale(0); opacity: 0; }
            70% { transform: scale(1.1); }
            100% { transform: scale(1); opacity: 1; }
        }

        @keyframes floatHint {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            25% { transform: translateY(-4px) rotate(0.5deg); }
            75% { transform: translateY(4px) rotate(-0.5deg); }
        }

        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }

        @keyframes pulse-heart {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); box-shadow: 0 0 40px rgba(255,87,26,0.6); }
        }

        @keyframes shake-x {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-4px) rotate(-5deg); }
            75% { transform: translateX(4px) rotate(5deg); }
        }

        .animate-entrance-card {
            animation: slideUpSpring 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
            will-change: transform, opacity;
        }

        .animate-pop-delay {
            opacity: 0;
            animation: popIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
            animation-delay: 0.6s;
            will-change: transform, opacity;
        }

        .animate-float {
            animation: floatHint 6s ease-in-out infinite;
        }

        .shimmer-effect::after {
            content: '';
            position: absolute;
            top: 0; right: 0; bottom: 0; left: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
            background-size: 200% 100%;
            animation: shimmer 4s infinite linear;
            pointer-events: none;
        }

        .hover-pulse:hover {
            animation: pulse-heart 0.8s infinite cubic-bezier(0.4, 0, 0.2, 1);
        }

        .hover-shake:hover {
            animation: shake-x 0.4s infinite ease-in-out;
        }

        .tab-transition {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>

<script>
        const tabMovies = document.getElementById('tab-movies');
        const tabBooks = document.getElementById('tab-books');

        tabMovies.addEventListener('click', () => {
            tabMovies.classList.add('bg-primary-container', 'text-on-primary-container', 'shadow-lg');
            tabMovies.classList.remove('text-on-surface-variant');
            tabBooks.classList.remove('bg-primary-container', 'text-on-primary-container', 'shadow-lg');
            tabBooks.classList.add('text-on-surface-variant');
        });

        tabBooks.addEventListener('click', () => {
            tabBooks.classList.add('bg-primary-container', 'text-on-primary-container', 'shadow-lg');
            tabBooks.classList.remove('text-on-surface-variant');
            tabMovies.classList.remove('bg-primary-container', 'text-on-primary-container', 'shadow-lg');
            tabMovies.classList.add('text-on-surface-variant');
        });

        const card = document.getElementById('discovery-card');
        let startX = 0;
        let currentX = 0;
        let isDragging = false;

        card.addEventListener('mousedown', startDrag);
        card.addEventListener('touchstart', startDrag);

        window.addEventListener('mousemove', drag);
        window.addEventListener('touchmove', drag, { passive: false });

        window.addEventListener('mouseup', stopDrag);
        window.addEventListener('touchend', stopDrag);

        function startDrag(e) {
            isDragging = true;
            startX = e.type === 'mousedown' ? e.pageX : e.touches[0].pageX;
            card.style.transition = 'none';
            card.classList.remove('animate-float'); // Stop floating hint while dragging
        }

        function drag(e) {
            if (!isDragging) return;
            if (e.type === 'touchmove') e.preventDefault();
            const x = e.type === 'mousemove' ? e.pageX : e.touches[0].pageX;
            currentX = x - startX;
            const rotation = currentX / 20;
            // Hardware acceleration
            card.style.transform = `translate3d(${currentX}px, 0, 0) rotate(${rotation}deg)`;
            
            if (currentX > 50) {
                card.style.borderColor = 'rgba(255, 87, 26, 0.5)';
            } else if (currentX < -50) {
                card.style.borderColor = 'rgba(255, 255, 255, 0.2)';
            } else {
                card.style.borderColor = 'rgba(255, 255, 255, 0.1)';
            }
        }

        function stopDrag() {
            if (!isDragging) return;
            isDragging = false;
            card.style.transition = 'transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275), border-color 0.3s';
            
            if (Math.abs(currentX) > 150) {
                const direction = currentX > 0 ? 1000 : -1000;
                card.style.transform = `translate3d(${direction}px, 0, 0) rotate(${direction / 20}deg)`;
                setTimeout(() => {
                    card.style.transition = 'none';
                    card.style.transform = 'translate3d(0, 0, 0) scale(0.8)';
                    card.style.opacity = '0';
                    setTimeout(() => {
                        card.style.transition = 'all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1)';
                        card.style.transform = 'translate3d(0, 0, 0) scale(1)';
                        card.style.opacity = '1';
                        card.style.borderColor = 'rgba(255, 255, 255, 0.1)';
                        card.classList.add('animate-float');
                    }, 100);
                }, 300);
            } else {
                card.style.transform = 'translate3d(0, 0, 0) rotate(0deg)';
                card.style.borderColor = 'rgba(255, 255, 255, 0.1)';
                card.classList.add('animate-float');
            }
            currentX = 0;
        }
    </script>
